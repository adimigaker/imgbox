<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>imgbox</title>
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #e5e5e5;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        body.light {
            background: #f5f5f5;
            color: #1a1a1a;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            color: #6c63ff;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ===== BUTTON ===== */
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #2a2a2a;
            color: #e5e5e5;
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.15);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: #6c63ff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #5a52e0;
        }

        .btn-success {
            background: #28a745;
            color: #fff;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-danger:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #444;
            color: #e5e5e5;
        }

        body.light .btn-outline {
            border-color: #ccc;
            color: #1a1a1a;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        body.light .btn-outline:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 8px;
        }

        /* ===== TOKEN INPUT ===== */
        .token-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1a1a1a;
            border-radius: 10px;
            padding: 2px 8px 2px 12px;
            border: 1.5px solid #333;
            transition: all 0.3s;
        }

        body.light .token-wrapper {
            background: #fff;
            border-color: #ddd;
        }

        .token-wrapper:focus-within {
            border-color: #6c63ff;
        }

        .token-wrapper .token-status {
            font-size: 14px;
            line-height: 1;
        }

        .token-input {
            background: transparent;
            border: none;
            color: #e5e5e5;
            font-size: 12px;
            padding: 6px 0;
            width: 160px;
            outline: none;
            font-family: monospace;
        }

        body.light .token-input {
            color: #1a1a1a;
        }

        .token-input::placeholder {
            color: #666;
        }

        .token-wrapper.token-saved {
            border-color: #28a745;
        }

        .token-wrapper.token-saved .token-status {
            color: #28a745;
        }

        @media (max-width: 600px) {
            .token-input {
                width: 100px;
                font-size: 11px;
            }
            .token-wrapper {
                padding: 2px 6px 2px 10px;
            }
        }

        /* ===== ALBUM GRID ===== */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .album-card {
            background: #161616;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #2a2a2a;
            position: relative;
        }

        body.light .album-card {
            background: #fff;
            border-color: #e8e8e8;
        }

        .album-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            border-color: #6c63ff;
        }

        .album-card .cover {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            background: #1a1a1a;
        }

        .album-card .info {
            padding: 14px 16px 16px;
        }

        .album-card .info h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .album-card .info .meta {
            font-size: 12px;
            color: #888;
        }

        body.light .album-card .info .meta {
            color: #777;
        }

        .album-card .info .badge {
            display: inline-block;
            background: #2a2a2a;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 6px;
            color: #999;
        }

        body.light .album-card .info .badge {
            background: #f0f0f0;
            color: #666;
        }

        /* Hapus album button di card */
        .album-delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(220, 53, 69, 0.9);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
            opacity: 0;
            z-index: 5;
            backdrop-filter: blur(4px);
        }

        .album-card:hover .album-delete-btn {
            opacity: 1;
        }

        .album-delete-btn:hover {
            transform: scale(1.15);
            background: #dc3545;
        }

        .album-delete-btn svg {
            width: 16px;
            height: 16px;
            stroke: white;
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        /* ===== DETAIL VIEW ===== */
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .detail-header .left h2 {
            font-size: 26px;
            font-weight: 700;
        }

        .detail-header .left .sub {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }

        body.light .detail-header .left .sub {
            color: #666;
        }

        .back-btn {
            background: none;
            border: none;
            color: #6c63ff;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #5a52e0;
        }

        .detail-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ===== IMAGE GRID ===== */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 16px;
        }

        @media (min-width: 600px) {
            .image-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .image-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .image-item {
            background: #141414;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }

        body.light .image-item {
            background: #fafafa;
        }

        .image-item.selected {
            border-color: #6c63ff;
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.15);
        }

        .image-wrapper {
            position: relative;
            aspect-ratio: 1/1;
            background: #1a1a1a;
            overflow: hidden;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .image-wrapper:hover img {
            transform: scale(1.03);
        }

        /* Overlay */
        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: space-between;
            padding: 8px;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.5) 0%, transparent 55%);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .image-wrapper:hover .image-overlay,
        .image-item .image-overlay.always-show {
            opacity: 1;
        }

        .image-overlay>* {
            pointer-events: auto;
        }

        /* Checkbox */
        .checkbox-btn {
            background: rgba(0, 0, 0, 0.65);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            padding: 0;
            backdrop-filter: blur(4px);
        }

        .checkbox-btn:hover {
            background: rgba(108, 99, 255, 0.6);
            border-color: #6c63ff;
            transform: scale(1.05);
        }

        .checkbox-btn.checked {
            background: #6c63ff;
            border-color: #6c63ff;
        }

        .checkbox-btn svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            display: none;
        }

        .checkbox-btn.checked svg {
            display: block;
        }

        /* Delete X */
        .delete-btn {
            background: rgba(220, 53, 69, 0.88);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            padding: 0;
            backdrop-filter: blur(4px);
        }

        .delete-btn:hover {
            transform: scale(1.12);
            background: #dc3545;
        }

        .delete-btn svg {
            width: 14px;
            height: 14px;
            stroke: white;
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        /* Image Info */
        .image-info {
            padding: 10px 12px 12px;
        }

        .image-info .filename {
            font-size: 12px;
            font-weight: 500;
            color: #999;
            display: block;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        body.light .image-info .filename {
            color: #555;
        }

        .image-info .url-copy {
            font-size: 11px;
            color: #6c63ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(108, 99, 255, 0.08);
            transition: all 0.2s ease;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-family: 'Courier New', monospace;
        }

        body.light .image-info .url-copy {
            background: rgba(108, 99, 255, 0.06);
        }

        .image-info .url-copy:hover {
            background: rgba(108, 99, 255, 0.16);
            transform: scale(1.01);
        }

        .image-info .url-copy svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .image-info .url-copy .url-text {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state .icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .empty-state h3 {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 8px;
        }

        body.light .empty-state h3 {
            color: #444;
        }

        .empty-state p {
            color: #777;
            font-size: 14px;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal {
            background: #1a1a1a;
            border-radius: 18px;
            max-width: 480px;
            width: 100%;
            padding: 30px 32px;
            border: 1px solid #2a2a2a;
            animation: slideUp 0.3s ease;
        }

        body.light .modal {
            background: #fff;
            border-color: #e8e8e8;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal h3 {
            font-size: 20px;
            margin-bottom: 6px;
        }

        .modal p {
            color: #888;
            font-size: 14px;
            margin-bottom: 22px;
            line-height: 1.5;
        }

        body.light .modal p {
            color: #666;
        }

        .modal .actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a1a;
            color: #e5e5e5;
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        body.light .toast {
            background: #fff;
            color: #1a1a1a;
            border-color: #e8e8e8;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: #28a745;
        }
        .toast.error {
            border-color: #dc3545;
        }
        .toast.warning {
            border-color: #ffc107;
        }

        /* ===== TOGGLE THEME ===== */
        .toggle-theme {
            background: none;
            border: none;
            color: #e5e5e5;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            transition: transform 0.3s ease;
        }

        .toggle-theme:hover {
            transform: rotate(20deg);
        }

        body.light .toggle-theme {
            color: #1a1a1a;
        }

        /* ===== HIDDEN ===== */
        .hidden {
            display: none !important;
        }

        #fileInput {
            display: none;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #141414;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        body.light ::-webkit-scrollbar-track {
            background: #f0f0f0;
        }
        body.light ::-webkit-scrollbar-thumb {
            background: #ccc;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .loading .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a2a;
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 16px;
        }

        body.light .loading .spinner {
            border-color: #ddd;
            border-top-color: #6c63ff;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn .spinner-sm {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <!-- HEADER -->
        <header class="header">
            <h1>📦 img<span>box</span></h1>
            <div class="header-actions">
                <!-- TOKEN INPUT -->
                <div class="token-wrapper" id="tokenWrapper">
                    <span class="token-status" id="tokenStatus">🔑</span>
                    <input type="password" class="token-input" id="tokenInput" placeholder="Token GitHub" />
                </div>
                <button class="btn btn-success btn-sm" onclick="saveToken()" id="saveTokenBtn">💾</button>
                <button class="toggle-theme" id="themeToggle" title="Toggle theme">🌙</button>
                <button class="btn btn-primary" id="addAlbumBtn">+ Album Baru</button>
                <button class="btn btn-outline btn-sm" onclick="refreshData()" id="refreshBtn" title="Refresh dari GitHub">🔄</button>
            </div>
        </header>

        <!-- HOME VIEW -->
        <div id="homeView">
            <div id="albumGrid" class="album-grid"></div>
            <div id="emptyAlbum" class="empty-state hidden">
                <div class="icon">🖼️</div>
                <h3>Belum ada album</h3>
                <p>Klik <strong>"+ Album Baru"</strong> untuk mulai upload gambar</p>
            </div>
        </div>

        <!-- DETAIL VIEW -->
        <div id="detailView" class="hidden">
            <div class="detail-header">
                <div class="left">
                    <button class="back-btn" id="backHomeBtn">← Kembali</button>
                    <h2 id="detailTitle">Album</h2>
                    <div class="sub" id="detailSub">0 gambar</div>
                </div>
                <div class="detail-actions">
                    <button class="btn btn-primary btn-sm" id="addImageBtn">+ Tambah</button>
                    <button class="btn btn-danger btn-sm" id="deleteSelectedBtn" disabled>🗑️ <span id="selectedCount">0</span></button>
                    <button class="btn btn-outline btn-sm" onclick="confirmDeleteAlbum()">🗑️ Hapus Album</button>
                </div>
            </div>

            <div id="imageGrid" class="image-grid"></div>
            <div id="emptyImage" class="empty-state hidden">
                <div class="icon">📷</div>
                <h3>Belum ada gambar</h3>
                <p>Klik <strong>"+ Tambah"</strong> untuk upload gambar ke album ini</p>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h3 id="modalTitle">Konfirmasi</h3>
            <p id="modalMessage">Yakin ingin menghapus?</p>
            <div class="actions">
                <button class="btn btn-outline" id="modalCancel">Batal</button>
                <button class="btn btn-danger" id="modalConfirm">Hapus</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- FILE INPUT -->
    <input type="file" id="fileInput" accept="image/*" multiple />

    <script>
        // ============================================================
        //  CONFIG
        // ============================================================
        const TOKEN_KEY = 'github_token';
        const GITHUB_REPO = 'adimigaker/imgbox';
        const GITHUB_BRANCH = 'main';
        const DATA_FILE = 'albums.json';

        let GITHUB_TOKEN = localStorage.getItem(TOKEN_KEY) || '';
        let albums = [];
        let currentAlbumId = null;
        let selectedImages = new Set();
        let pendingDeleteTarget = null;
        let pendingDeleteType = '';
        let isLoading = false;

        // ============================================================
        //  INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            updateTokenUI();

            const savedTheme = localStorage.getItem('imgbox_theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeToggle').textContent = '☀️';
            }

            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('addAlbumBtn').addEventListener('click', createNewAlbum);
            document.getElementById('backHomeBtn').addEventListener('click', goHome);
            document.getElementById('addImageBtn').addEventListener('click', () => document.getElementById('fileInput').click());
            document.getElementById('fileInput').addEventListener('change', handleFileUpload);
            document.getElementById('deleteSelectedBtn').addEventListener('click', confirmDeleteSelected);
            document.getElementById('modalCancel').addEventListener('click', closeModal);
            document.getElementById('modalConfirm').addEventListener('click', executeDelete);

            loadAlbumsFromGitHub();
        });

        // ============================================================
        //  TOKEN UI
        // ============================================================
        function updateTokenUI() {
            const wrapper = document.getElementById('tokenWrapper');
            const input = document.getElementById('tokenInput');
            const status = document.getElementById('tokenStatus');

            if (GITHUB_TOKEN) {
                wrapper.classList.add('token-saved');
                status.textContent = '✅';
                input.placeholder = 'Token tersimpan';
                input.value = '';
            } else {
                wrapper.classList.remove('token-saved');
                status.textContent = '🔑';
                input.placeholder = 'Token GitHub';
            }
        }

        function saveToken() {
            const input = document.getElementById('tokenInput');
            const token = input.value.trim();

            if (!token) {
                showToast('⚠️ Masukkan token dulu!', 'warning');
                return;
            }

            localStorage.setItem(TOKEN_KEY, token);
            GITHUB_TOKEN = token;
            updateTokenUI();
            showToast('✅ Token berhasil disimpan!', 'success');
            loadAlbumsFromGitHub();
        }

        // ============================================================
        //  LOAD DATA FROM GITHUB
        // ============================================================
        async function loadAlbumsFromGitHub() {
            if (isLoading) return;
            isLoading = true;

            const grid = document.getElementById('albumGrid');
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.innerHTML = '⏳';

            grid.innerHTML = `
                    <div class="loading" style="grid-column:1/-1;">
                        <div class="spinner"></div>
                        <p>Memuat data dari GitHub...</p>
                    </div>
                `;

            try {
                const url =
                    `https://raw.githubusercontent.com/${GITHUB_REPO}/${GITHUB_BRANCH}/${DATA_FILE}`;
                const response = await fetch(url);

                if (!response.ok) {
                    albums = [];
                } else {
                    const data = await response.json();
                    albums = data.albums || [];
                }

                saveAlbumsToLocal();
                renderHome();
                showToast('✅ Data dimuat dari GitHub', 'success');

            } catch (err) {
                console.error(err);
                const local = localStorage.getItem('imgbox_albums');
                if (local) {
                    try {
                        albums = JSON.parse(local);
                        renderHome();
                        showToast('⚠️ Pakai data lokal (gagal load GitHub)', 'warning');
                    } catch {
                        albums = [];
                        renderHome();
                    }
                } else {
                    albums = [];
                    renderHome();
                }
            }

            isLoading = false;
            refreshBtn.innerHTML = '🔄';
        }

        function refreshData() {
            loadAlbumsFromGitHub();
        }

        // ============================================================
        //  SAVE DATA TO GITHUB
        // ============================================================
        async function saveAlbumsToGitHub() {
            if (!GITHUB_TOKEN) {
                showToast('⚠️ Token belum disimpan!', 'warning');
                return false;
            }

            try {
                const content = btoa(unescape(encodeURIComponent(JSON.stringify({ albums }, null, 2))));
                const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_FILE}`;

                let sha = '';
                const checkRes = await fetch(`${url}?ref=${GITHUB_BRANCH}`, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });

                if (checkRes.ok) {
                    const data = await checkRes.json();
                    sha = data.sha;
                }

                const body = {
                    message: `Update albums data`,
                    content: content,
                    branch: GITHUB_BRANCH
                };
                if (sha) body.sha = sha;

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || 'Gagal simpan data');
                }

                return true;
            } catch (err) {
                console.error(err);
                showToast('❌ Gagal simpan data: ' + err.message, 'error');
                return false;
            }
        }

        // ============================================================
        //  LOCAL STORAGE (cache)
        // ============================================================
        function saveAlbumsToLocal() {
            localStorage.setItem('imgbox_albums', JSON.stringify(albums));
        }

        // ============================================================
        //  RENDER: HOME
        // ============================================================
        function renderHome() {
            const grid = document.getElementById('albumGrid');
            const empty = document.getElementById('emptyAlbum');

            if (albums.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            const baseUrl = `https://${GITHUB_REPO.split('/')[0]}.github.io/${GITHUB_REPO.split('/')[1]}`;

            grid.innerHTML = albums.map(album => {
                const coverUrl = album.cover ? `${baseUrl}/${album.cover}` :
                    'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23222%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2240%22%3E🖼%3C/text%3E%3C/svg%3E';
                return `
                        <div class="album-card" data-id="${album.id}">
                            <div onclick="openAlbum('${album.id}')">
                                <img class="cover" src="${coverUrl}" alt="${album.name}" loading="lazy" />
                                <div class="info">
                                    <h3>${album.name}</h3>
                                    <div class="meta">${album.images.length} gambar · ${album.date}</div>
                                    <span class="badge">📂 ${album.id}</span>
                                </div>
                            </div>
                            <button class="album-delete-btn" onclick="event.stopPropagation();confirmDeleteAlbumFromHome('${album.id}')" title="Hapus album">
                                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                    `;
            }).join('');
        }

        // ============================================================
        //  RENDER: DETAIL
        // ============================================================
        function renderDetail(albumId) {
            const album = albums.find(a => a.id === albumId);
            if (!album) return goHome();

            currentAlbumId = albumId;
            selectedImages.clear();
            updateDeleteButton();

            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            document.getElementById('detailTitle').textContent = album.name;
            document.getElementById('detailSub').textContent = `${album.images.length} gambar · ${album.date}`;

            const grid = document.getElementById('imageGrid');
            const empty = document.getElementById('emptyImage');

            if (album.images.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            const baseUrl = `https://${GITHUB_REPO.split('/')[0]}.github.io/${GITHUB_REPO.split('/')[1]}`;

            grid.innerHTML = album.images.map((img) => {
                const filename = img.split('/').pop();
                const fullUrl = `${baseUrl}/${img}`;
                const isSelected = selectedImages.has(img);
                return `
                        <div class="image-item ${isSelected ? 'selected' : ''}" data-img="${img}">
                            <div class="image-wrapper">
                                <img src="${fullUrl}" alt="${filename}" loading="lazy" />
                                <div class="image-overlay always-show">
                                    <button class="checkbox-btn ${isSelected ? 'checked' : ''}" onclick="toggleImageSelect('${img}')">
                                        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
                                    </button>
                                    <button class="delete-btn" onclick="confirmDeleteSingle('${img}')">
                                        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="image-info">
                                <span class="filename">${filename}</span>
                                <div class="url-copy" onclick="copyUrl('${fullUrl}', this)">
                                    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                    <span class="url-text">${fullUrl}</span>
                                </div>
                            </div>
                        </div>
                    `;
            }).join('');
        }

        // ============================================================
        //  NAVIGASI
        // ============================================================
        function openAlbum(id) {
            renderDetail(id);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goHome() {
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
            renderHome();
            currentAlbumId = null;
            selectedImages.clear();
            document.getElementById('fileInput').value = '';
        }

        // ============================================================
        //  ALBUM
        // ============================================================
        async function createNewAlbum() {
            const name = prompt('Nama album:');
            if (!name || name.trim() === '') return;

            const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'album';
            const now = new Date().toISOString().split('T')[0];

            const album = {
                id: `${id}-${Date.now().toString(36)}`,
                name: name.trim(),
                date: now,
                cover: '',
                images: []
            };

            albums.unshift(album);
            saveAlbumsToLocal();

            const success = await saveAlbumsToGitHub();
            if (success) {
                renderHome();
                openAlbum(album.id);
                showToast('✅ Album "' + album.name + '" dibuat!', 'success');
            } else {
                albums = albums.filter(a => a.id !== album.id);
                saveAlbumsToLocal();
                renderHome();
            }
        }

        function confirmDeleteAlbumFromHome(albumId) {
            const album = albums.find(a => a.id === albumId);
            if (!album) return;

            pendingDeleteTarget = { type: 'album', albumId, album };
            pendingDeleteType = 'album';

            document.getElementById('modalTitle').textContent = 'Hapus Album';
            document.getElementById('modalMessage').textContent =
                `Yakin ingin menghapus album <strong>"${album.name}"</strong> beserta <strong>${album.images.length}</strong> gambarnya?`;
            document.getElementById('confirmModal').classList.add('active');
        }

        function confirmDeleteAlbum() {
            if (!currentAlbumId) return;
            const album = albums.find(a => a.id === currentAlbumId);
            if (!album) return;

            pendingDeleteTarget = { type: 'album', albumId: currentAlbumId, album };
            pendingDeleteType = 'album';

            document.getElementById('modalTitle').textContent = 'Hapus Album';
            document.getElementById('modalMessage').textContent =
                `Yakin ingin menghapus album <strong>"${album.name}"</strong> beserta <strong>${album.images.length}</strong> gambarnya?`;
            document.getElementById('confirmModal').classList.add('active');
        }

        // ============================================================
        //  UPLOAD GAMBAR
        // ============================================================
        async function handleFileUpload(e) {
            const files = e.target.files;
            if (!files.length) return;
            if (!currentAlbumId) return;

            const album = albums.find(a => a.id === currentAlbumId);
            if (!album) return;

            if (!GITHUB_TOKEN) {
                showToast('⚠️ Token belum disimpan!', 'warning');
                return;
            }

            const albumFolder = `img/${album.id}`;
            const baseUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents`;

            showToast(`⏳ Uploading ${files.length} gambar...`, 'warning');

            let uploaded = 0;
            for (const file of files) {
                try {
                    const ext = file.name.split('.').pop();
                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                    const cleanName = file.name.replace(/\.[^.]+$/, '').toLowerCase().replace(/[^a-z0-9]+/g, '-');
                    const filename = `${timestamp}-${cleanName}.${ext}`;
                    const path = `${albumFolder}/${filename}`;

                    const reader = new FileReader();
                    const content = await new Promise((resolve) => {
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.readAsDataURL(file);
                    });

                    const response = await fetch(`${baseUrl}/${path}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Upload ${filename}`,
                            content: content,
                            branch: GITHUB_BRANCH
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.message || 'Upload gagal');
                    }

                    album.images.push(path);
                    uploaded++;

                } catch (err) {
                    console.error(err);
                    showToast('❌ Gagal upload: ' + file.name, 'error');
                }
            }

            if (uploaded === 0) {
                showToast('❌ Gagal upload semua gambar', 'error');
                return;
            }

            if (!album.cover && album.images.length > 0) {
                album.cover = album.images[0];
            }
            album.date = new Date().toISOString().split('T')[0];

            saveAlbumsToLocal();
            const success = await saveAlbumsToGitHub();

            if (success) {
                renderDetail(currentAlbumId);
                document.getElementById('fileInput').value = '';
                showToast(`✅ ${uploaded} gambar berhasil diupload!`, 'success');
            } else {
                for (let i = 0; i < uploaded; i++) {
                    album.images.pop();
                }
                saveAlbumsToLocal();
                renderDetail(currentAlbumId);
                showToast('❌ Gagal simpan data album', 'error');
            }
        }

        // ============================================================
        //  DELETE ALBUM
        // ============================================================
        async function executeDeleteAlbum(albumId, album) {
            if (!GITHUB_TOKEN) {
                showToast('⚠️ Token belum disimpan!', 'warning');
                return false;
            }

            try {
                const baseUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents`;

                for (const imgPath of album.images) {
                    try {
                        const shaRes = await fetch(`${baseUrl}/${imgPath}?ref=${GITHUB_BRANCH}`, {
                            headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                        });

                        if (shaRes.ok) {
                            const shaData = await shaRes.json();
                            await fetch(`${baseUrl}/${imgPath}`, {
                                method: 'DELETE',
                                headers: {
                                    'Authorization': `token ${GITHUB_TOKEN}`,
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    message: `Delete ${imgPath.split('/').pop()}`,
                                    sha: shaData.sha,
                                    branch: GITHUB_BRANCH
                                })
                            });
                        }
                    } catch (err) {
                        console.warn('Gagal hapus file:', imgPath, err);
                    }
                }

                albums = albums.filter(a => a.id !== albumId);
                saveAlbumsToLocal();
                await saveAlbumsToGitHub();

                return true;
            } catch (err) {
                console.error(err);
                showToast('❌ Gagal hapus album: ' + err.message, 'error');
                return false;
            }
        }

        // ============================================================
        //  DELETE: Single Image
        // ============================================================
        function confirmDeleteSingle(imgPath) {
            const album = albums.find(a => a.id === currentAlbumId);
            if (!album) return;

            const filename = imgPath.split('/').pop();
            pendingDeleteTarget = { type: 'single', imgPath, album };
            pendingDeleteType = 'single';

            document.getElementById('modalTitle').textContent = 'Hapus Gambar';
            document.getElementById('modalMessage').textContent = `Yakin ingin menghapus <strong>"${filename}"</strong>?`;
            document.getElementById('confirmModal').classList.add('active');
        }

        // ============================================================
        //  DELETE: Multiple Images
        // ============================================================
        function confirmDeleteSelected() {
            if (selectedImages.size === 0) return;

            const album = albums.find(a => a.id === currentAlbumId);
            if (!album) return;

            pendingDeleteTarget = { type: 'multiple', paths: Array.from(selectedImages), album };
            pendingDeleteType = 'multiple';

            document.getElementById('modalTitle').textContent = 'Hapus Gambar Terpilih';
            document.getElementById('modalMessage').textContent =
                `Yakin ingin menghapus <strong>${selectedImages.size}</strong> gambar terpilih?`;
            document.getElementById('confirmModal').classList.add('active');
        }

        // ============================================================
        //  EXECUTE DELETE
        // ============================================================
        async function executeDelete() {
            closeModal();

            const target = pendingDeleteTarget;
            if (!target) return;

            if (target.type === 'album') {
                const { albumId, album } = target;
                const success = await executeDeleteAlbum(albumId, album);
                if (success) {
                    goHome();
                    showToast('🗑️ Album dihapus', 'success');
                }
                pendingDeleteTarget = null;
                pendingDeleteType = '';
                return;
            }

            if (target.type === 'single') {
                const { imgPath, album } = target;
                const success = await deleteImageFromRepo(imgPath);
                if (success) {
                    album.images = album.images.filter(i => i !== imgPath);
                    if (album.cover === imgPath) {
                        album.cover = album.images[0] || '';
                    }
                    saveAlbumsToLocal();
                    await saveAlbumsToGitHub();
                    renderDetail(currentAlbumId);
                    showToast('🗑️ Gambar dihapus', 'success');
                }
            } else if (target.type === 'multiple') {
                const { paths, album } = target;
                let successCount = 0;
                for (const path of paths) {
                    const ok = await deleteImageFromRepo(path);
                    if (ok) {
                        album.images = album.images.filter(i => i !== path);
                        if (album.cover === path) {
                            album.cover = album.images[0] || '';
                        }
                        successCount++;
                    }
                }
                saveAlbumsToLocal();
                await saveAlbumsToGitHub();
                renderDetail(currentAlbumId);
                selectedImages.clear();
                updateDeleteButton();
                showToast(`🗑️ ${successCount} gambar dihapus`, 'success');
            }

            pendingDeleteTarget = null;
            pendingDeleteType = '';
        }

        // ============================================================
        //  DELETE IMAGE FROM REPO
        // ============================================================
        async function deleteImageFromRepo(path) {
            if (!GITHUB_TOKEN) return false;

            try {
                const shaRes = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${path}?ref=${GITHUB_BRANCH}`, {
                        headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                    }
                );

                if (!shaRes.ok) return true;

                const shaData = await shaRes.json();
                const deleteRes = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Delete ${path.split('/').pop()}`,
                            sha: shaData.sha,
                            branch: GITHUB_BRANCH
                        })
                    }
                );

                return deleteRes.ok;
            } catch (err) {
                console.error(err);
                return false;
            }
        }

        // ============================================================
        //  TOGGLE SELECT
        // ============================================================
        function toggleImageSelect(imgPath) {
            if (selectedImages.has(imgPath)) {
                selectedImages.delete(imgPath);
            } else {
                selectedImages.add(imgPath);
            }

            const items = document.querySelectorAll('.image-item');
            items.forEach(item => {
                const img = item.dataset.img;
                if (img === imgPath) {
                    item.classList.toggle('selected');
                    const btn = item.querySelector('.checkbox-btn');
                    btn.classList.toggle('checked');
                }
            });

            updateDeleteButton();
        }

        function updateDeleteButton() {
            const count = selectedImages.size;
            const btn = document.getElementById('deleteSelectedBtn');

            if (count > 0) {
                btn.disabled = false;
                btn.innerHTML = `🗑️ ${count}`;
            } else {
                btn.disabled = true;
                btn.innerHTML = `🗑️ 0`;
            }
        }

        // ============================================================
        //  COPY URL
        // ============================================================
        function copyUrl(url, element) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(() => {
                    showToast('✅ URL copied!', 'success');
                }).catch(() => {
                    fallbackCopy(url);
                });
            } else {
                fallbackCopy(url);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('✅ URL copied!', 'success');
            } catch {
                showToast('❌ Gagal copy', 'error');
            }
            document.body.removeChild(textarea);
        }

        // ============================================================
        //  TOAST
        // ============================================================
        let toastTimeout = null;

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2800);
        }

        // ============================================================
        //  MODAL
        // ============================================================
        function closeModal() {
            document.getElementById('confirmModal').classList.remove('active');
            pendingDeleteTarget = null;
            pendingDeleteType = '';
        }

        document.getElementById('confirmModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        // ============================================================
        //  THEME
        // ============================================================
        function toggleTheme() {
            const isLight = document.body.classList.toggle('light');
            const btn = document.getElementById('themeToggle');
            btn.textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('imgbox_theme', isLight ? 'light' : 'dark');
        }

        // ============================================================
        //  KEYBOARD
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                if (!document.getElementById('detailView').classList.contains('hidden')) {
                    goHome();
                }
            }
        });

        // ============================================================
        //  EXPOSE GLOBAL
        // ============================================================
        window.openAlbum = openAlbum;
        window.goHome = goHome;
        window.toggleImageSelect = toggleImageSelect;
        window.confirmDeleteSingle = confirmDeleteSingle;
        window.confirmDeleteSelected = confirmDeleteSelected;
        window.confirmDeleteAlbum = confirmDeleteAlbum;
        window.confirmDeleteAlbumFromHome = confirmDeleteAlbumFromHome;
        window.copyUrl = copyUrl;
        window.closeModal = closeModal;
        window.executeDelete = executeDelete;
        window.createNewAlbum = createNewAlbum;
        window.saveToken = saveToken;
        window.refreshData = refreshData;
    </script>

</body>
